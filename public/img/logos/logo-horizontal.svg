<svg viewBox="0 0 222 58" xmlns="http://www.w3.org/2000/svg">
  <!-- Ícono 54x54 -->
  <rect x="0" y="2" width="54" height="54" rx="13" fill="#003876"/>
  <!-- Capa interna sutil -->
  <rect x="7" y="9" width="40" height="40" rx="9" fill="white" fill-opacity="0.06"/>
  <!-- Nodos circuito -->
  <circle cx="16" cy="38" r="2.2" fill="white" fill-opacity="0.45"/>
  <circle cx="27" cy="26" r="2.2" fill="white" fill-opacity="0.45"/>
  <circle cx="38" cy="38" r="2.2" fill="white" fill-opacity="0.28"/>
  <!-- Trazos circuito -->
  <path d="M16 36 V31 H27 V29" stroke="white" stroke-opacity="0.22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M27 29 H38 V36" stroke="white" stroke-opacity="0.14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Texto HR centrado -->
  <text x="27" y="31" text-anchor="middle" dominant-baseline="middle"
        font-family="Roboto, 'Helvetica Neue', sans-serif"
        font-size="21" font-weight="900" fill="white" letter-spacing="-0.5">HR</text>
  <!-- Nombre: "HR" bold + "Library" light — baseline y=35 -->
  <text x="66" y="26" dominant-baseline="middle"
        font-family="Roboto, 'Helvetica Neue', sans-serif"
        font-size="24" font-weight="700" fill="#003876" letter-spacing="-0.8">HR</text>
  <text x="94" y="26" dominant-baseline="middle"
        font-family="Roboto, 'Helvetica Neue', sans-serif"
        font-size="24" font-weight="300" fill="#2B2F36">Library</text>
  <!-- Tagline -->
  <text x="66" y="44" dominant-baseline="middle"
        font-family="Roboto, 'Helvetica Neue', sans-serif"
        font-size="10" font-weight="400" fill="#708090" letter-spacing="2.2">FRONTEND FRAMEWORK</text>
</svg>
